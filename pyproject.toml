[tool.ruff]
extend-exclude = [
    ".venv",
    "venv",
    "build",
    "dist",
    "generated",
    "models",
    "node_modules",
    "outputs",
    "third_party",
]

[tool.ruff.lint]
select = ["TID252"]

[tool.ruff.lint.flake8-tidy-imports]
ban-relative-imports = "all"

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["TID252"]
"__init__.py" = ["TID252"]
