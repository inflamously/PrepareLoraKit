# example: reference project config — every field shows its default.
# Copy to configs/projects/<your-name>.yaml and edit. Select with `--project <name>`
# or name it after your dataset folder for automatic detection.

name: example

# pipeline: ordered list of steps to run. Each entry has a `type:` that picks
# which operation runs, plus step-specific options. Remove or reorder steps as
# needed. Available types:
#   ImportStep       QualityGateStep  CurateStep  UpscaleStep  CaptionBboxStep
#   VaeGateStep      AuditStep        BucketPoolsCheckStep  ExportStep
#
# Ordering rules (enforced on load):
#   - Steps follow the dataset workflow order and dependency graph.
#   - ExportStep only requires ImportStep, so export can run even when images are unchanged.
#   - Legacy configs that start with QualityGateStep are loaded with ImportStep
#     inserted automatically.
# Each step can also list ordered substeps with enabled flags. Omitted substeps
# are filled from defaults when the project is loaded.

pipeline:
  - type: ImportStep
    substeps:
      - {id: import_images, enabled: true}

  - type: QualityGateStep
    substeps:
      - {id: score_images, enabled: true}
      - {id: review_decisions, enabled: true}
    scorers:
      - {name: min_side,  enabled: true, op: lt, threshold: 1024.0}
      - {name: blur,      enabled: true, op: lt, threshold: 100.0, borderline: 150.0}
      - {name: noise,     enabled: true, op: gt, threshold: 25.0}
      - {name: jpeg,      enabled: true, op: gt, threshold: 0.08}
      - {name: watermark, enabled: true, op: gt, threshold: 0.80}
    manual_review: true
    auto_only: false         # true = skip all manual review
    manual_all: false        # true = review every image (mutually exclusive w/ auto_only)

  - type: CurateStep
    substeps:
      - {id: duplicate_check, enabled: true}
      - {id: clip_scan, enabled: true}
      - {id: drop_images, enabled: true}
    dedup_hamming_distance: 8   # 4 = stricter, 12 = looser
    pca_umap_switch_threshold: 30
    umap_n_neighbors: 15
    umap_min_dist: 0.1
    pca_n_components: 2

  - type: UpscaleStep
    substeps:
      - {id: select_upscale_candidates, enabled: true}
      - {id: upscale_images, enabled: true}
      - {id: hallucination_check, enabled: true}
    upscale_target: 3072
    hallucination_ssim_threshold: 0.60  # 0..1
    upscale_model: seedvr2              # seedvr2 | lanczos | custom
    seedvr2_dit_model: seedvr2_ema_3b_fp8_e4m3fn.safetensors
    seedvr2_model_residency: auto       # auto | gpu | cpu
    # Recommended 20-24 GB 7B path:
    # seedvr2_dit_model: seedvr2_ema_7b_fp8_e4m3fn_mixed_block35_fp16.safetensors

  - type: CaptionBboxStep
    substeps:
      - {id: annotate_regions, enabled: true}
      - {id: caption_images, enabled: true}
      - {id: validate_captions, enabled: true}
    caption_model_id: "Qwen/Qwen2-VL-7B-Instruct"
    caption_model_task: auto
    vram_tier: auto   # auto | low (<=16GB,4bit) | mid (<=24GB,8bit) | high | max
    max_new_tokens: 200
    spot_check_pct: 0.10  # 0..1

  - type: VaeGateStep
    substeps:
      - {id: reconstruct_images, enabled: true}
      - {id: review_vae_artifacts, enabled: true}
      - {id: apply_vae_decisions, enabled: true}
    vae_model_id: black-forest-labs/FLUX.2-klein-base-9B
    vae_config_id: null
    diff_amplification: 4.0            # 8.0 = brighter DIFF panel
    gaussian_blur_sigma: 2.0
    gaussian_blur_kernel: 21           # must be odd
    otsu_enabled: true
    output_previews: true
    output_silhouettes: true
    output_hard_silhouettes: true
    outlier_sigma: 2.0
    hf_cutoff_fraction: 0.25           # (0, 0.5)
    max_side: 1536
    seed: 42

  - type: AuditStep
    substeps:
      - {id: check_pairing, enabled: true}
      - {id: check_corrupt_files, enabled: true}
      - {id: check_caption_quality, enabled: true}
      - {id: check_resolution, enabled: true}
    min_caption: 5
    max_caption: 600
    check_pairing: true
    check_corrupt: true
    check_caption_length: true
    check_resolution_gate: true
    min_resolution_side: 1536
    caption_model_type: auto

  - type: BucketPoolsCheckStep
    substeps:
      - {id: assign_bucket_pools, enabled: true}
      - {id: report_thin_buckets, enabled: true}
      - {id: write_cache_info, enabled: false}
    thin_threshold: 2
    cache_mode: false            # true = write cache_info.json
    resolution_buckets:
      - [1024, 1024]
      - [1152, 896]
      - [896, 1152]
      - [1216, 832]
      - [832, 1216]
      - [1344, 768]
      - [768, 1344]
      - [1536, 640]
      - [640, 1536]

  - type: ExportStep
    substeps:
      - {id: preview_export_diff, enabled: true}
      - {id: copy_export, enabled: true}
    target_dir: null             # null → sibling <input>_export folder ready for LoRA training
