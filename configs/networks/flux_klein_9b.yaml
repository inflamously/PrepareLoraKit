name: flux-klein-9b
display_name: "Flux.2 Klein 9B"
resolution_buckets:
  - [1024, 1024]
  - [1152, 896]
  - [896, 1152]
  - [1216, 832]
  - [832, 1216]
  - [1344, 768]
  - [768, 1344]
  - [1536, 640]
  - [640, 1536]
max_pixels: 1048576
# ai-toolkit datasets[].resolution = flat list of base pixel-budget sides;
# the toolkit auto-buckets each to aspect ratios. (resolution_buckets above
# is used by the local bucket-sim in step 8, not emitted to ai-toolkit.)
train_resolutions: [512, 768, 1024]
vae_model_id: "black-forest-labs/FLUX.2-klein-base-9B"
lr_range: [0.0002, 0.0008]
rank_range: [16, 64]
model_type: flux2_klein_9b
noise_scheduler: flowmatch
lr_alpha_rank_ratio_range: [0.5, 2.0]
requires_diff_guidance: false

# config_template holds the network-static sections merged into the ai-toolkit
# `config.process[0]` block by step 7. Per-run values (name, folders, steps, lr,
# rank/alpha, ema, samples) are overlaid by s7_config.run().
config_template:
  model:
    name_or_path: "black-forest-labs/FLUX.2-klein-base-9B"
    arch: flux2_klein_9b
    quantize: true
    qtype: qfloat8
    quantize_te: true
    qtype_te: qfloat8
    low_vram: false
    model_kwargs:
      match_target_res: false
    layer_offloading: false
    layer_offloading_text_encoder_percent: 1
    layer_offloading_transformer_percent: 1
  network:
    type: lora
    linear: 16
    linear_alpha: 16
    conv: 16
    conv_alpha: 16
  save:
    dtype: bf16
    save_format: diffusers
    push_to_hub: false
  train:
    batch_size: 1
    steps: 3000
    gradient_accumulation: 1
    train_unet: true
    train_text_encoder: false
    gradient_checkpointing: true
    noise_scheduler: flowmatch
    optimizer: automagic3
    optimizer_params:
      weight_decay: 0.0001
    timestep_type: weighted
    content_or_style: balanced
    loss_type: mse
    bypass_guidance_embedding: false
    unload_text_encoder: false
    cache_text_embeddings: false
    dtype: bf16
    diff_output_preservation: false
    diff_output_preservation_multiplier: 1
    diff_output_preservation_class: grandpa
    switch_boundary_every: 1
    do_differential_guidance: false
    differential_guidance_scale: 4
    ema_config:
      use_ema: false
      ema_decay: 0.99
  sample:
    sampler: flowmatch
    guidance_scale: 4
    sample_steps: 20
    num_frames: 1
    fps: 1
    neg: ''
    seed: 42
    walk_seed: false
